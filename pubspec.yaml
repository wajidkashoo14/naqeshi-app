name: naqeshi_app
description: Naqeshi — Authentic Kashmiri Papier-Mâché Handicrafts
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # HTTP
  dio: ^5.4.3+1

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Images
  cached_network_image: ^3.3.1

  # Payments
  razorpay_flutter: ^1.3.7

  # Google Sign-In
  google_sign_in: ^6.2.1

  # UI utilities
  smooth_page_indicator: ^1.2.0+3
  carousel_slider: ^4.2.1
  intl: ^0.19.0

  # Font
  google_fonts: ^6.2.1

  # URL launcher (order tracking links)
  url_launcher: ^6.3.0

  # Image picker for profile photo
  image_picker: ^1.1.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
